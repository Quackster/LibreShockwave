<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreShockwave Web Player</title>
    <link rel="stylesheet" href="../libreshockwave.css">
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay" style="display:none;">
        <div class="loading-title">LibreShockwave</div>
        <div class="loading-bar-container">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
        <div class="loading-text" id="loading-text">Loading...</div>
    </div>

    <div class="container">
        <!-- File controls -->
        <div class="controls">
            <div class="file-controls">
                <label class="file-label">
                    <input type="file" id="file-picker" accept=".dcr,.dir,.dxr,.cct,.cst">
                    Choose File
                </label>
                <span class="or">or</span>
                <input type="text" id="url-input" placeholder="Enter URL to .dcr/.dir file">
                <button id="load-url-btn">Load URL</button>
            </div>
        </div>

        <!-- Stage -->
        <div id="main-content" class="main-content">
            <div class="stage-area">
                <div class="stage-wrapper">
                    <canvas id="shockwave-stage" width="640" height="480"></canvas>
                </div>
            </div>
        </div>

        <!-- Transport controls -->
        <div class="transport-controls">
            <button id="step-back-btn" disabled title="Step Backward (Left)">|&lt;</button>
            <button id="play-btn" disabled title="Play (Space)">&#9654;</button>
            <button id="pause-btn" disabled title="Pause (Space)">&#9646;&#9646;</button>
            <button id="stop-btn" disabled title="Stop (Esc)">&#9632;</button>
            <button id="step-fwd-btn" disabled title="Step Forward (Right)">&gt;|</button>
            <input type="range" id="frame-slider" min="1" max="1" value="1" disabled>
            <span id="frame-info" class="frame-info"></span>
        </div>

        <div id="status" class="status">Waiting for a movie file...</div>
    </div>

    <script src="../shockwave-lib.js"></script>
    <script>
        var player = null;
        var isPlaying = false;

        var statusEl = document.getElementById('status');
        var filePicker = document.getElementById('file-picker');
        var urlInput = document.getElementById('url-input');
        var loadUrlBtn = document.getElementById('load-url-btn');
        var playBtn = document.getElementById('play-btn');
        var pauseBtn = document.getElementById('pause-btn');
        var stopBtn = document.getElementById('stop-btn');
        var stepFwdBtn = document.getElementById('step-fwd-btn');
        var stepBackBtn = document.getElementById('step-back-btn');
        var frameSlider = document.getElementById('frame-slider');
        var frameInfo = document.getElementById('frame-info');

        function enableControls() {
            playBtn.disabled = false;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            stepFwdBtn.disabled = false;
            stepBackBtn.disabled = false;
            frameSlider.disabled = false;
        }

        function dismissLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        // Create the player using shockwave-lib's unified API
        player = LibreShockwave.create('shockwave-stage', {
            basePath: '../',
            autoplay: false,
            onLoad: function(info) {
                statusEl.textContent = 'Loaded (' + info.width + 'x' + info.height + ', ' + info.frameCount + ' frames)';
                enableControls();
                frameSlider.max = info.frameCount;
                dismissLoading();
            },
            onFrame: function(frame, total) {
                frameInfo.textContent = 'Frame ' + frame + ' / ' + total;
                frameSlider.max = total;
                frameSlider.value = frame;
            },
            onError: function(msg) {
                statusEl.textContent = 'Error: ' + msg;
                dismissLoading();
            }
        });

        statusEl.textContent = 'Ready. Load a movie file to begin.';

        // === File loading ===

        filePicker.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                statusEl.textContent = 'Loading ' + e.target.files[0].name + '...';
                player.loadFile(e.target.files[0]);
            }
        });

        function loadFromUrl(url) {
            statusEl.textContent = 'Fetching ' + url + '...';
            player.load(url);
        }

        loadUrlBtn.addEventListener('click', function() {
            var url = urlInput.value.trim();
            if (url) loadFromUrl(url);
        });

        urlInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var url = urlInput.value.trim();
                if (url) loadFromUrl(url);
            }
        });

        // === Playback controls ===

        function doPlay() {
            player.play();
            isPlaying = true;
            statusEl.textContent = 'Playing';
        }

        function doPause() {
            player.pause();
            isPlaying = false;
            statusEl.textContent = 'Paused';
        }

        function doStop() {
            player.stop();
            isPlaying = false;
            statusEl.textContent = 'Stopped';
        }

        function togglePlayPause() {
            if (isPlaying) doPause(); else doPlay();
        }

        playBtn.addEventListener('click', doPlay);
        pauseBtn.addEventListener('click', doPause);
        stopBtn.addEventListener('click', doStop);
        stepFwdBtn.addEventListener('click', function() { player.stepForward(); });
        stepBackBtn.addEventListener('click', function() { player.stepBackward(); });

        frameSlider.addEventListener('input', function() {
            player.goToFrame(parseInt(this.value));
        });

        // === Keyboard shortcuts ===

        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === ' ') {
                e.preventDefault();
                togglePlayPause();
            } else if (e.key === 'Escape') {
                doStop();
            } else if (e.key === 'ArrowRight' && !e.ctrlKey) {
                e.preventDefault();
                player.stepForward();
            } else if (e.key === 'ArrowLeft' && !e.ctrlKey) {
                e.preventDefault();
                player.stepBackward();
            } else if (e.key === 'Home') {
                e.preventDefault();
                player.goToFrame(1);
            } else if (e.key === 'End') {
                e.preventDefault();
                player.goToFrame(player.getFrameCount());
            }
        });
    </script>
</body>
</html>
