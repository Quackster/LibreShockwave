name: export-ts

# Opt-in CI for the Director→TypeScript/PixiJS exporter (libreshockwave_export_ts) and its
# hand-written TS runtime. This is deliberately separate from cmake.yml/nightly-wasm.yml: it
# builds the exporter probe, exports a synthetic project, and runs the TS typecheck + the
# self-contained differential harness (TS compositor vs the C++ reference frames the exporter
# ships). It is opt-in (workflow_dispatch) plus a daily schedule so it does not gate every push.
#
# The differential gate uses `--self-test-inks` (synthetic frames covering every InkMode value,
# no binary fixture required) because the real-movie fixture (mobiles_disco.dir) lives under
# gitignored artifacts/ and is not in the repo. The runtime-template standalone gate
# (typecheck + unit tests) is also run.

on:
  schedule:
    # Daily at 03:17 UTC (off the :00 mark to spread fleet load).
    - cron: '17 3 * * *'
  workflow_dispatch:

jobs:
  export-ts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zlib1g-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            cpp/apps/tools/ts/runtime-template/package-lock.json
            cpp/apps/tools/ts/export-template/package.json

      - name: Configure
        run: cmake -S . -B cmake-build-debug -DCMAKE_BUILD_TYPE=Debug

      - name: Build exporter
        run: cmake --build cmake-build-debug --target libreshockwave_export_ts -j 2

      # Runtime-template standalone gate: the hand-written runtime source of truth must be
      # typecheck-clean and its unit tests must pass on its own (before it is copied into an
      # export). The differential test there is env-gated and skips without LSDIFF_EXPORT_DIR.
      - name: Runtime-template typecheck + unit tests
        working-directory: cpp/apps/tools/ts/runtime-template
        run: |
          npm ci
          npm run typecheck
          npx vitest run

      # Export a synthetic self-contained project (all 20 inks × 3 variants = 60 frames, no
      # movie fixture needed), then verify the export: typecheck the runtime + main.ts + emitted
      # modules, and run the self-contained differential harness (TS compositor vs the C++
      # reference frames the exporter shipped under assets/reference/). Bit-exact at tolerance 0.
      - name: Export synthetic project
        run: |
          cmake-build-debug/cpp/libreshockwave_export_ts --self-test-inks --out export-ts-out

      - name: Verify exported project (typecheck + differential)
        working-directory: export-ts-out
        run: |
          npm install
          npx tsc --noEmit
          npx vitest run