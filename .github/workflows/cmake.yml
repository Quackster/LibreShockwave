name: CMake

on:
  push:
    branches: [ main, cplusplus/port ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ zlib1g-dev

      - name: Configure
        run: cmake -S . -B cmake-build-debug -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build cmake-build-debug --target libreshockwave_tests libreshockwave_probe libreshockwave_render_probe libreshockwave_wasm_bridge_probe -j 2

      - name: Test
        run: ctest --test-dir cmake-build-debug --output-on-failure
