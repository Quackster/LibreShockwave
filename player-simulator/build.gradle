plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    mainClass = 'com.libreshockwave.player.simulator.PlayerSimulator'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':player-core')
}

tasks.register('runHttpIntegrationTest', JavaExec) {
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.libreshockwave.player.simulator.HttpIntegrationTest'
}
