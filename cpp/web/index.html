<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LibreShockwave C++ WASM Player</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #d7dde3;
            color: #1f2933;
            font: 12px Verdana, Arial, Helvetica, sans-serif;
        }

        main {
            width: min(1180px, calc(100% - 24px));
            margin: 12px auto;
            border: 1px solid #8c99a6;
            background: #f5f7f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            background: #245b89;
            color: white;
            font-weight: bold;
        }

        .toolbar,
        .params {
            padding: 10px;
            border-bottom: 1px solid #bcc7d1;
            background: #edf2f6;
        }

        .toolbar {
            display: grid;
            grid-template-columns: auto minmax(220px, 1fr) repeat(8, auto);
            gap: 8px;
            align-items: center;
        }

        label {
            font-weight: bold;
        }

        input,
        textarea {
            min-width: 0;
            border: 1px solid #8c99a6;
            background: white;
            color: #1f2933;
            font: inherit;
        }

        input {
            height: 28px;
            padding: 4px 7px;
        }

        input[type="number"] {
            width: 70px;
        }

        textarea {
            width: 100%;
            min-height: 48px;
            resize: vertical;
            padding: 5px 7px;
            line-height: 1.35;
        }

        button {
            min-width: 58px;
            height: 28px;
            padding: 0 10px;
            border: 1px solid #2a5580;
            background: #336699;
            color: white;
            font: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        button.secondary {
            border-color: #9aa1a8;
            background: #e6ebef;
            color: #1f2933;
            font-weight: normal;
        }

        button.danger {
            border-color: #9f4f4f;
            background: #f0dddd;
            color: #5f1f1f;
            font-weight: normal;
        }

        .params-header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }

        .param-list {
            display: grid;
            gap: 8px;
        }

        .param-row {
            display: grid;
            grid-template-columns: 84px minmax(180px, 1fr) auto;
            gap: 8px;
            align-items: start;
        }

        .stage {
            display: flex;
            justify-content: center;
            padding: 14px;
            background: #c9d2da;
            overflow: auto;
        }

        canvas {
            display: block;
            width: min(100%, var(--stage-display-width, 960px));
            height: auto;
            max-width: var(--stage-display-width, 960px);
            background: black;
            border: 1px solid #111820;
        }

        .status {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            min-height: 30px;
            padding: 7px 10px;
            border-top: 1px solid #bcc7d1;
            background: #f7f7f7;
        }

        @media (max-width: 980px) {
            main {
                width: 100%;
                margin: 0;
                border-left: 0;
                border-right: 0;
            }

            .toolbar {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .toolbar label,
            .toolbar #movie-url {
                grid-column: 1 / -1;
            }

            .param-row {
                grid-template-columns: 1fr auto;
            }

            .param-row textarea {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <span>LibreShockwave C++ WASM Player</span>
            <span id="runtime-state">idle</span>
        </header>
        <section class="toolbar">
            <label for="movie-url">Movie URL</label>
            <input id="movie-url" type="text" value="https://sandbox.h4bbo.net/dcr/14.1_b8/habbo.dcr">
            <button id="load-button" type="button">Load</button>
            <button id="play-button" type="button" class="secondary">Play</button>
            <button id="pause-button" type="button" class="secondary">Pause</button>
            <button id="prev-frame-button" type="button" class="secondary">Prev</button>
            <button id="next-frame-button" type="button" class="secondary">Next</button>
            <label for="frame-number">Frame</label>
            <input id="frame-number" type="number" min="1" step="1" value="1">
            <button id="go-frame-button" type="button" class="secondary">Go</button>
            <label for="fps-input">FPS</label>
            <input id="fps-input" type="number" min="1" max="120" step="1" value="12">
        </section>
        <section class="params">
            <div class="params-header">
                <label>External params</label>
                <div>
                    <button id="add-param-button" type="button" class="secondary">Add</button>
                    <button id="reset-params-button" type="button" class="secondary">Reset</button>
                </div>
            </div>
            <div id="param-list" class="param-list"></div>
        </section>
        <section class="stage">
            <canvas id="stage" width="640" height="480"></canvas>
        </section>
        <section class="status">
            <span id="status">Waiting for C++ WASM runtime.</span>
            <span id="frame-info"></span>
        </section>
    </main>

    <script src="libreshockwave-cpp-player.js"></script>
    <script>
        (function() {
            var DEFAULT_MOVIE = 'https://sandbox.h4bbo.net/dcr/14.1_b8/habbo.dcr';
            var DEFAULT_SCRIPT_TIMEOUT_MS = 0;
            var DEFAULT_PARAMS = {
                sw1: 'site.url=http://www.habbo.co.uk;url.prefix=http://www.habbo.co.uk',
                sw2: 'connection.info.host=au.h4bbo.net;connection.info.port=30001',
                sw3: 'client.reload.url=https://sandbox.h4bbo.net/',
                sw4: 'connection.mus.host=au.h4bbo.net;connection.mus.port=38101',
                sw5: 'external.variables.txt=https://sandbox.h4bbo.net/gamedata/external_variables.txt;external.texts.txt=https://sandbox.h4bbo.net/gamedata/external_texts.txt'
            };
            var DEFAULT_PARAM_ORDER = ['sw1', 'sw2', 'sw3', 'sw4', 'sw5'];

            var status = document.getElementById('status');
            var frameInfo = document.getElementById('frame-info');
            var runtimeState = document.getElementById('runtime-state');
            var urlInput = document.getElementById('movie-url');
            var fpsInput = document.getElementById('fps-input');
            var frameInput = document.getElementById('frame-number');
            var paramList = document.getElementById('param-list');
            var stageCanvas = document.getElementById('stage');
            var query = new URLSearchParams(location.search);

            function copyDefaultParams() {
                var copied = {};
                Object.keys(DEFAULT_PARAMS).forEach(function(key) {
                    copied[key] = DEFAULT_PARAMS[key];
                });
                return copied;
            }

            function readQueryParams() {
                var externalParams = copyDefaultParams();
                query.forEach(function(value, key) {
                    if (key.indexOf('param.') === 0 && key.length > 6) {
                        externalParams[key.substring(6)] = value;
                    } else if (/^sw\d+$/i.test(key) || key === 'swText') {
                        externalParams[key] = value;
                    }
                });
                return externalParams;
            }

            function readScriptTimeoutMs() {
                var value = query.get('scriptTimeoutMs') || query.get('script-timeout-ms');
                if (value == null || value === '') {
                    return DEFAULT_SCRIPT_TIMEOUT_MS;
                }
                var parsed = Number(value);
                return isFinite(parsed) && parsed >= 0 ? parsed : DEFAULT_SCRIPT_TIMEOUT_MS;
            }

            function createParamRow(key, value) {
                var row = document.createElement('div');
                row.className = 'param-row';

                var keyInput = document.createElement('input');
                keyInput.type = 'text';
                keyInput.value = key || '';
                keyInput.setAttribute('aria-label', 'Parameter name');

                var valueInput = document.createElement('textarea');
                valueInput.value = value || '';
                valueInput.setAttribute('aria-label', 'Parameter value');

                var remove = document.createElement('button');
                remove.type = 'button';
                remove.className = 'danger';
                remove.textContent = 'Remove';
                remove.addEventListener('click', function() {
                    row.remove();
                });

                row.appendChild(keyInput);
                row.appendChild(valueInput);
                row.appendChild(remove);
                return row;
            }

            function setParamRows(params) {
                var keys = DEFAULT_PARAM_ORDER.slice();
                Object.keys(params).forEach(function(key) {
                    if (keys.indexOf(key) === -1) {
                        keys.push(key);
                    }
                });
                paramList.textContent = '';
                keys.forEach(function(key) {
                    paramList.appendChild(createParamRow(key, params[key] || ''));
                });
            }

            function currentParams() {
                var params = {};
                Array.prototype.forEach.call(paramList.querySelectorAll('.param-row'), function(row) {
                    var key = row.querySelector('input').value.trim();
                    var value = row.querySelector('textarea').value;
                    if (key) {
                        params[key] = value;
                    }
                });
                return params;
            }

            function applyFps() {
                player.setFps(fpsInput.value);
            }

            function resizeStage(info) {
                var width = Math.max(1, info && info.width ? info.width | 0 : stageCanvas.width);
                var height = Math.max(1, info && info.height ? info.height | 0 : stageCanvas.height);
                stageCanvas.style.setProperty('--stage-display-width', width + 'px');
                stageCanvas.style.aspectRatio = width + ' / ' + height;
            }

            function loadMovie() {
                applyFps();
                player.clearParams();
                var params = currentParams();
                Object.keys(params).forEach(function(key) {
                    player.setParam(key, params[key]);
                });
                runtimeState.textContent = 'loading';
                status.textContent = 'Loading movie...';
                player.load(urlInput.value, { params: params });
            }

            var player = LibreShockwaveCppPlayer.create('stage', {
                params: readQueryParams(),
                scriptTimeoutMs: readScriptTimeoutMs(),
                onReady: function() {
                    runtimeState.textContent = 'ready';
                    status.textContent = 'Runtime ready.';
                    applyFps();
                },
                onLoad: function(info) {
                    resizeStage(info);
                    status.textContent = 'Loaded ' + info.width + 'x' + info.height + '.';
                    frameInput.max = String(Math.max(1, info.frameCount || 1));
                },
                onFrame: function(frame) {
                    runtimeState.textContent = player.playing ? 'playing' : 'paused';
                    frameInfo.textContent = 'frame ' + frame.frame + ' / ' + frame.frameCount +
                        ', sprites ' + frame.spriteCount;
                    frameInput.value = String(Math.max(1, frame.frame || 1));
                    window.__libreshockwaveCppLastFrame = frame;
                },
                onError: function(message) {
                    runtimeState.textContent = 'error';
                    status.textContent = message;
                    window.__libreshockwaveCppLastError = message;
                },
                onDebugLog: function(message) {
                    var logs = window.__libreshockwaveCppDebugLogs || [];
                    logs.push(message);
                    if (logs.length > 200) {
                        logs.shift();
                    }
                    window.__libreshockwaveCppDebugLogs = logs;
                }
            });
            window.__libreshockwaveCppPlayer = player;

            document.getElementById('load-button').addEventListener('click', loadMovie);
            document.getElementById('play-button').addEventListener('click', function() {
                applyFps();
                player.play();
                runtimeState.textContent = 'playing';
            });
            document.getElementById('pause-button').addEventListener('click', function() {
                player.pause();
                runtimeState.textContent = 'paused';
            });
            document.getElementById('prev-frame-button').addEventListener('click', function() {
                player.pause();
                player.stepBackward();
            });
            document.getElementById('next-frame-button').addEventListener('click', function() {
                player.pause();
                player.stepForward();
            });
            document.getElementById('go-frame-button').addEventListener('click', function() {
                player.pause();
                player.goToFrame(parseInt(frameInput.value, 10) || 1);
            });
            fpsInput.addEventListener('change', applyFps);
            document.getElementById('add-param-button').addEventListener('click', function() {
                paramList.appendChild(createParamRow('', ''));
            });
            document.getElementById('reset-params-button').addEventListener('click', function() {
                setParamRows(copyDefaultParams());
            });

            urlInput.value = query.get('movie') || DEFAULT_MOVIE;
            if (query.has('fps')) {
                fpsInput.value = query.get('fps');
            }
            setParamRows(readQueryParams());

            if (query.has('movie') || query.get('autoload') === '1') {
                loadMovie();
            }
        })();
    </script>
</body>
</html>
