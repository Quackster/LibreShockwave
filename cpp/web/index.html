<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LibreShockwave C++ WASM Player</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: #d7dde3;
            color: #1f2933;
            font: 12px Verdana, Arial, Helvetica, sans-serif;
        }

        main {
            width: min(1180px, calc(100% - 24px));
            margin: 12px auto;
            border: 1px solid #8c99a6;
            background: #f5f7f9;
        }

        header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            background: #245b89;
            color: white;
            font-weight: bold;
        }

        .toolbar,
        .params {
            padding: 10px;
            border-bottom: 1px solid #bcc7d1;
            background: #edf2f6;
        }

        .toolbar {
            display: grid;
            grid-template-columns: auto minmax(190px, 240px) auto minmax(220px, 1fr) repeat(10, auto);
            gap: 8px;
            align-items: center;
        }

        label {
            font-weight: bold;
        }

        input,
        select,
        textarea {
            min-width: 0;
            border: 1px solid #8c99a6;
            background: white;
            color: #1f2933;
            font: inherit;
        }

        input,
        select {
            height: 28px;
            padding: 4px 7px;
        }

        input[type="number"] {
            width: 70px;
        }

        textarea {
            width: 100%;
            min-height: 48px;
            resize: vertical;
            padding: 5px 7px;
            line-height: 1.35;
        }

        button {
            min-width: 58px;
            height: 28px;
            padding: 0 10px;
            border: 1px solid #2a5580;
            background: #336699;
            color: white;
            font: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        button.secondary {
            border-color: #9aa1a8;
            background: #e6ebef;
            color: #1f2933;
            font-weight: normal;
        }

        button.danger {
            border-color: #9f4f4f;
            background: #f0dddd;
            color: #5f1f1f;
            font-weight: normal;
        }

        .params-header {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            margin-bottom: 8px;
        }

        .param-list {
            display: grid;
            gap: 8px;
        }

        .param-row {
            display: grid;
            grid-template-columns: 84px minmax(180px, 1fr) auto;
            gap: 8px;
            align-items: start;
        }

        .stage {
            display: flex;
            justify-content: center;
            padding: 14px;
            background: #c9d2da;
            overflow: auto;
        }

        canvas {
            display: block;
            width: min(100%, var(--stage-display-width, 960px));
            height: auto;
            max-width: var(--stage-display-width, 960px);
            background: black;
            border: 1px solid #111820;
        }

        .status {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            min-height: 30px;
            padding: 7px 10px;
            border-top: 1px solid #bcc7d1;
            background: #f7f7f7;
        }

        @media (max-width: 980px) {
            main {
                width: 100%;
                margin: 0;
                border-left: 0;
                border-right: 0;
            }

            .toolbar {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }

            .toolbar #movie-preset,
            .toolbar label,
            .toolbar #movie-url {
                grid-column: 1 / -1;
            }

            .param-row {
                grid-template-columns: 1fr auto;
            }

            .param-row textarea {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>
    <main>
        <header>
            <span>LibreShockwave C++ WASM Player</span>
            <span id="runtime-state">idle</span>
        </header>
        <section class="toolbar">
            <label for="movie-preset">Preset</label>
            <select id="movie-preset"></select>
            <label for="movie-url">Movie URL</label>
            <input id="movie-url" type="text" value="">
            <button id="load-button" type="button">Load</button>
            <button id="play-button" type="button" class="secondary">Play</button>
            <button id="pause-button" type="button" class="secondary">Pause</button>
            <button id="prev-frame-button" type="button" class="secondary">Prev</button>
            <button id="next-frame-button" type="button" class="secondary">Next</button>
            <label for="frame-number">Frame</label>
            <input id="frame-number" type="number" min="1" step="1" value="1">
            <button id="go-frame-button" type="button" class="secondary">Go</button>
            <label for="fps-input">FPS</label>
            <input id="fps-input" type="number" min="1" max="120" step="1" value="12">
        </section>
        <section class="params">
            <div class="params-header">
                <label>External params</label>
                <div>
                    <button id="add-param-button" type="button" class="secondary">Add</button>
                    <button id="reset-params-button" type="button" class="secondary">Reset</button>
                </div>
            </div>
            <div id="param-list" class="param-list"></div>
        </section>
        <section class="stage">
            <canvas id="stage" width="640" height="480"></canvas>
        </section>
        <section class="status">
            <span id="status">Waiting for C++ WASM runtime.</span>
            <span id="frame-info"></span>
        </section>
    </main>

    <script src="libreshockwave-cpp-player.js"></script>
    <script>
        (function() {
            var MOVIE_PRESETS = {
                'classichabbo-beta': {
                    label: 'ClassicHabbo beta r31',
                    movie: 'https://images.classichabbo.com/dcr/r31_20090312_0433_13751_b40895fb6101dbe96dc7b9d6477eeeb4/habbo.dcr?',
                    params: {
                        'venus.websocket.mode': 'ws',
                        sw1: 'client.allow.cross.domain=1;client.notify.cross.domain=0',
                        sw2: 'connection.info.host=verysecret.classichabbo.com;connection.info.port=30100',
                        sw3: 'connection.mus.host=verysecret.classichabbo.com;connection.mus.port=38201',
                        sw4: 'site.url=;url.prefix=',
                        sw5: 'client.reload.url=/client/beta?x=reauthenticate;client.fatal.error.url=/clientutils?key=error',
                        sw6: 'client.connection.failed.url=/clientutils?key=connection_failed;external.variables.txt=https://images.classichabbo.com/gamedata/external_variables.txt?',
                        sw7: 'external.texts.txt=https://images.classichabbo.com/gamedata/external_texts.txt?',
                        sw8: 'use.sso.ticket=1;sso.ticket='
                    },
                    paramOrder: ['venus.websocket.mode', 'sw1', 'sw2', 'sw3', 'sw4', 'sw5', 'sw6', 'sw7', 'sw8']
                },
                'sandbox-h4bbo': {
                    label: 'Sandbox H4bbo 14.1_b8',
                    movie: 'https://sandbox.h4bbo.net/dcr/14.1_b8/habbo.dcr',
                    params: {
                        sw1: 'site.url=http://www.habbo.co.uk;url.prefix=http://www.habbo.co.uk',
                        sw2: 'connection.info.host=au.h4bbo.net;connection.info.port=30001',
                        sw3: 'client.reload.url=https://sandbox.h4bbo.net/',
                        sw4: 'connection.mus.host=au.h4bbo.net;connection.mus.port=38101',
                        sw5: 'external.variables.txt=https://sandbox.h4bbo.net/gamedata/external_variables.txt;external.texts.txt=https://sandbox.h4bbo.net/gamedata/external_texts.txt'
                    },
                    paramOrder: ['sw1', 'sw2', 'sw3', 'sw4', 'sw5']
                }
            };
            var DEFAULT_PRESET_ID = 'classichabbo-beta';
            var CUSTOM_PRESET_ID = 'custom';
            var DEFAULT_MOVIE = MOVIE_PRESETS[DEFAULT_PRESET_ID].movie;
            var DEFAULT_SCRIPT_TIMEOUT_MS = 0;

            var status = document.getElementById('status');
            var frameInfo = document.getElementById('frame-info');
            var runtimeState = document.getElementById('runtime-state');
            var presetSelect = document.getElementById('movie-preset');
            var urlInput = document.getElementById('movie-url');
            var fpsInput = document.getElementById('fps-input');
            var frameInput = document.getElementById('frame-number');
            var paramList = document.getElementById('param-list');
            var stageCanvas = document.getElementById('stage');
            var query = new URLSearchParams(location.search);

            function presetById(id) {
                return MOVIE_PRESETS[id] || MOVIE_PRESETS[DEFAULT_PRESET_ID];
            }

            function copyPresetParams(id) {
                var preset = presetById(id);
                var copied = {};
                Object.keys(preset.params).forEach(function(key) {
                    copied[key] = preset.params[key];
                });
                return copied;
            }

            function readPresetId() {
                var id = query.get('preset') || query.get('moviePreset') || query.get('movie-preset') || DEFAULT_PRESET_ID;
                return MOVIE_PRESETS[id] ? id : DEFAULT_PRESET_ID;
            }

            function readQueryParams() {
                var externalParams = copyPresetParams(readPresetId());
                query.forEach(function(value, key) {
                    if (key.indexOf('param.') === 0 && key.length > 6) {
                        externalParams[key.substring(6)] = value;
                    } else if (/^sw\d+$/i.test(key) || key === 'swText') {
                        externalParams[key] = value;
                    }
                });
                return externalParams;
            }

            function readScriptTimeoutMs() {
                var value = query.get('scriptTimeoutMs') || query.get('script-timeout-ms');
                if (value == null || value === '') {
                    return DEFAULT_SCRIPT_TIMEOUT_MS;
                }
                var parsed = Number(value);
                return isFinite(parsed) && parsed >= 0 ? parsed : DEFAULT_SCRIPT_TIMEOUT_MS;
            }

            function createParamRow(key, value) {
                var row = document.createElement('div');
                row.className = 'param-row';

                var keyInput = document.createElement('input');
                keyInput.type = 'text';
                keyInput.value = key || '';
                keyInput.setAttribute('aria-label', 'Parameter name');
                keyInput.addEventListener('input', markCustomIfEdited);

                var valueInput = document.createElement('textarea');
                valueInput.value = value || '';
                valueInput.setAttribute('aria-label', 'Parameter value');
                valueInput.addEventListener('input', markCustomIfEdited);

                var remove = document.createElement('button');
                remove.type = 'button';
                remove.className = 'danger';
                remove.textContent = 'Remove';
                remove.addEventListener('click', function() {
                    row.remove();
                    markCustomIfEdited();
                });

                row.appendChild(keyInput);
                row.appendChild(valueInput);
                row.appendChild(remove);
                return row;
            }

            function presetParamOrder(id) {
                return presetById(id).paramOrder.slice();
            }

            function setParamRows(params, order) {
                var keys = (order || presetParamOrder(presetSelect.value || DEFAULT_PRESET_ID)).slice();
                Object.keys(params).forEach(function(key) {
                    if (keys.indexOf(key) === -1) {
                        keys.push(key);
                    }
                });
                paramList.textContent = '';
                keys.forEach(function(key) {
                    paramList.appendChild(createParamRow(key, params[key] || ''));
                });
            }

            function setPresetOptions(selectedId) {
                presetSelect.textContent = '';
                Object.keys(MOVIE_PRESETS).forEach(function(id) {
                    var option = document.createElement('option');
                    option.value = id;
                    option.textContent = MOVIE_PRESETS[id].label;
                    presetSelect.appendChild(option);
                });
                var custom = document.createElement('option');
                custom.value = CUSTOM_PRESET_ID;
                custom.textContent = 'Custom';
                presetSelect.appendChild(custom);
                presetSelect.value = selectedId || DEFAULT_PRESET_ID;
            }

            function applyPreset(id) {
                var preset = presetById(id);
                presetSelect.value = id;
                urlInput.value = preset.movie;
                setParamRows(copyPresetParams(id), preset.paramOrder);
            }

            function markCustomIfEdited() {
                presetSelect.value = CUSTOM_PRESET_ID;
            }

            function currentParams() {
                var params = {};
                Array.prototype.forEach.call(paramList.querySelectorAll('.param-row'), function(row) {
                    var key = row.querySelector('input').value.trim();
                    var value = row.querySelector('textarea').value;
                    if (key) {
                        params[key] = value;
                    }
                });
                return params;
            }

            function applyFps() {
                player.setFps(fpsInput.value);
            }

            function resizeStage(info) {
                var width = Math.max(1, info && info.width ? info.width | 0 : stageCanvas.width);
                var height = Math.max(1, info && info.height ? info.height | 0 : stageCanvas.height);
                stageCanvas.style.setProperty('--stage-display-width', width + 'px');
                stageCanvas.style.aspectRatio = width + ' / ' + height;
            }

            function loadMovie() {
                applyFps();
                player.clearParams();
                var params = currentParams();
                Object.keys(params).forEach(function(key) {
                    player.setParam(key, params[key]);
                });
                runtimeState.textContent = 'loading';
                status.textContent = 'Loading movie...';
                player.load(urlInput.value, { params: params, autoplay: true });
            }

            var player = LibreShockwaveCppPlayer.create('stage', {
                params: readQueryParams(),
                scriptTimeoutMs: readScriptTimeoutMs(),
                onReady: function() {
                    runtimeState.textContent = 'ready';
                    status.textContent = 'Runtime ready.';
                    applyFps();
                },
                onLoad: function(info) {
                    resizeStage(info);
                    status.textContent = 'Loaded ' + info.width + 'x' + info.height + '.';
                    frameInput.max = String(Math.max(1, info.frameCount || 1));
                },
                onFrame: function(frame) {
                    runtimeState.textContent = player.playing ? 'playing' : 'paused';
                    frameInfo.textContent = 'frame ' + frame.frame + ' / ' + frame.frameCount +
                        ', sprites ' + frame.spriteCount;
                    frameInput.value = String(Math.max(1, frame.frame || 1));
                    window.__libreshockwaveCppLastFrame = frame;
                },
                onError: function(message) {
                    runtimeState.textContent = 'error';
                    status.textContent = message;
                    window.__libreshockwaveCppLastError = message;
                },
                onGotoNetPage: function(url, target) {
                    var pages = window.__libreshockwaveCppGotoNetPages || [];
                    pages.push({ url: String(url || ''), target: String(target || '') });
                    window.__libreshockwaveCppGotoNetPages = pages;
                },
                onDebugLog: function(message) {
                    var logs = window.__libreshockwaveCppDebugLogs || [];
                    logs.push(message);
                    if (logs.length > 200) {
                        logs.shift();
                    }
                    window.__libreshockwaveCppDebugLogs = logs;
                }
            });
            window.__libreshockwaveCppPlayer = player;

            document.getElementById('load-button').addEventListener('click', loadMovie);
            document.getElementById('play-button').addEventListener('click', function() {
                applyFps();
                player.play();
                runtimeState.textContent = 'playing';
            });
            document.getElementById('pause-button').addEventListener('click', function() {
                player.pause();
                runtimeState.textContent = 'paused';
            });
            document.getElementById('prev-frame-button').addEventListener('click', function() {
                player.pause();
                player.stepBackward();
            });
            document.getElementById('next-frame-button').addEventListener('click', function() {
                player.pause();
                player.stepForward();
            });
            document.getElementById('go-frame-button').addEventListener('click', function() {
                player.pause();
                player.goToFrame(parseInt(frameInput.value, 10) || 1);
            });
            fpsInput.addEventListener('change', applyFps);
            document.getElementById('add-param-button').addEventListener('click', function() {
                paramList.appendChild(createParamRow('', ''));
                markCustomIfEdited();
            });
            document.getElementById('reset-params-button').addEventListener('click', function() {
                var presetId = MOVIE_PRESETS[presetSelect.value] ? presetSelect.value : DEFAULT_PRESET_ID;
                applyPreset(presetId);
            });
            presetSelect.addEventListener('change', function() {
                if (MOVIE_PRESETS[presetSelect.value]) {
                    applyPreset(presetSelect.value);
                    loadMovie();
                }
            });
            urlInput.addEventListener('input', markCustomIfEdited);

            var initialPresetId = readPresetId();
            setPresetOptions(initialPresetId);
            urlInput.value = query.get('movie') || presetById(initialPresetId).movie || DEFAULT_MOVIE;
            if (query.has('movie')) {
                presetSelect.value = CUSTOM_PRESET_ID;
            }
            if (query.has('fps')) {
                fpsInput.value = query.get('fps');
            }
            setParamRows(readQueryParams(), presetParamOrder(initialPresetId));

            if (query.get('autoload') !== '0') {
                loadMovie();
            }
        })();
    </script>
</body>
</html>
