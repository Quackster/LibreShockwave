<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LibreShockwave C++ Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #141514;
      --panel: #20231f;
      --panel-2: #2a2f2a;
      --line: #3b433c;
      --text: #f2f4ef;
      --muted: #aeb8aa;
      --accent: #61c089;
      --danger: #e07171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.35 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .app {
      display: grid;
      grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
      min-height: 100vh;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }
    h1 {
      font-size: 18px;
      line-height: 1.2;
      margin: 0;
      font-weight: 650;
      letter-spacing: 0;
    }
    .status {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      min-width: 0;
    }
    input, textarea, button {
      font: inherit;
    }
    input, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #111310;
      color: var(--text);
      padding: 8px 9px;
      outline: none;
    }
    textarea {
      min-height: 192px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.4;
      white-space: pre;
      overflow: auto;
    }
    textarea.compact {
      min-height: 74px;
    }
    textarea.debug-log {
      min-height: 132px;
      white-space: pre-wrap;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(97, 192, 137, .18);
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .row > * { min-width: 0; }
    button {
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      min-height: 34px;
    }
    button:hover { border-color: #657065; }
    button.primary {
      background: #25633d;
      border-color: #3d8156;
    }
    button.icon {
      width: 36px;
      padding: 0;
      font-size: 15px;
      font-weight: 700;
    }
    button.small {
      min-height: 28px;
      padding: 4px 8px;
      font-size: 12px;
    }
    input[type="checkbox"] {
      width: auto;
      accent-color: var(--accent);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .debug-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .stage-wrap {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #0b0c0b;
    }
    .stage-bar {
      height: 38px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 12px;
      color: var(--muted);
      background: #181a17;
      min-width: 0;
    }
    .stage-info {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stage-box {
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: auto;
      padding: 16px;
    }
    canvas {
      image-rendering: pixelated;
      background: #000;
      max-width: 100%;
      max-height: calc(100vh - 72px);
      outline: none;
      box-shadow: 0 0 0 1px #000, 0 8px 30px rgba(0,0,0,.38);
    }
    .tempo {
      display: grid;
      grid-template-columns: auto minmax(80px, 1fr);
      gap: 8px;
      align-items: center;
    }
    .error { color: var(--danger); }
    @media (max-width: 820px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto minmax(60vh, 1fr); }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      textarea { min-height: 120px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="sidebar">
      <div class="brand">
        <h1>LibreShockwave</h1>
        <span class="status" id="status">Idle</span>
      </div>
      <label>
        Movie URL
        <input id="movie-url" spellcheck="false">
      </label>
      <div class="row">
        <button id="load" class="primary">Load</button>
        <button id="play" class="icon" title="Play">▶</button>
        <button id="pause" class="icon" title="Pause">Ⅱ</button>
        <button id="stop" class="icon" title="Stop">■</button>
      </div>
      <div class="row">
        <button id="preset-habbo">14.1_b8</button>
        <button id="preset-loader">loader.dcr</button>
        <button id="preset-beta-client">beta client</button>
      </div>
      <label class="tempo">
        <span>Tempo override</span>
        <input id="tempo" type="number" min="0" max="240" step="1" value="0">
      </label>
      <label>
        External parameters
        <textarea id="params" spellcheck="false"></textarea>
      </label>
      <label class="toggle-row">
        <span>Debug playback</span>
        <input id="debug-playback" type="checkbox">
      </label>
      <div class="debug-log-header">
        <span>Debug log</span>
        <button id="clear-debug-log" class="small">Clear</button>
      </div>
      <textarea id="debug-log" class="compact debug-log" readonly spellcheck="false"></textarea>
    </section>
    <section class="stage-wrap">
      <div class="stage-bar">
        <div class="stage-info" id="frame-info">No movie</div>
        <div id="size-info"></div>
      </div>
      <div class="stage-box">
        <canvas id="stage" width="640" height="480"></canvas>
      </div>
    </section>
  </main>

  <script src="libreshockwave-cpp-player.js"></script>
  <script>
    const habboUrl = "http://127.0.0.1/dcr/14.1_b8/habbo.dcr";
    const loaderUrl = "http://127.0.0.1/dcr0910/loader.dcr";
    const betaClientMovieUrl = "http://127.0.0.1/dcr/r31_20090312_0433_13751_b40895fb6101dbe96dc7b9d6477eeeb4/habbo.dcr?";
    const betaClientSsoPlaceholder = "SSO_TICKET";
    const betaClientParams = {
      "venus.websocket.mode": "ws",
      "sw1": "client.allow.cross.domain=1;client.notify.cross.domain=0",
      "sw2": "connection.info.host=verysecret.classichabbo.com;connection.info.port=30100",
      "sw3": "connection.mus.host=verysecret.classichabbo.com;connection.mus.port=38201",
      "sw4": "site.url=http://127.0.0.1;url.prefix=http://127.0.0.1",
      "sw5": "client.reload.url=http://127.0.0.1/client/beta?x=reauthenticate;client.fatal.error.url=http://127.0.0.1/clientutils?key=error",
      "sw6": "client.connection.failed.url=http://127.0.0.1/clientutils?key=connection_failed;external.variables.txt=http://127.0.0.1/gamedata/external_variables.txt?",
      "sw7": "external.texts.txt=http://127.0.0.1/gamedata/external_texts.txt?",
      "sw8": `use.sso.ticket=1;sso.ticket=${betaClientSsoPlaceholder}`
    };
    const paramsBox = document.getElementById("params");
    const movieUrl = document.getElementById("movie-url");
    const status = document.getElementById("status");
    const frameInfo = document.getElementById("frame-info");
    const sizeInfo = document.getElementById("size-info");
    const tempo = document.getElementById("tempo");
    const loadButton = document.getElementById("load");
    const playButton = document.getElementById("play");
    const pauseButton = document.getElementById("pause");
    const stopButton = document.getElementById("stop");
    const debugPlayback = document.getElementById("debug-playback");
    const debugLog = document.getElementById("debug-log");
    const clearDebugLog = document.getElementById("clear-debug-log");
    const playbackButtons = [playButton, pauseButton, stopButton];

    function setPlaybackButtonsEnabled(enabled) {
      for (const button of playbackButtons) {
        button.disabled = !enabled;
      }
    }

    function debugValueToText(value) {
      if (value instanceof Error) return value.stack || value.message;
      if (typeof value === "string") return value;
      try {
        return JSON.stringify(value);
      } catch {
        return String(value);
      }
    }

    function appendDebugLog(level, message) {
      const text = debugValueToText(message);
      if (!text) return;
      const entry = {
        time: new Date().toISOString(),
        level: level || "debug",
        message: text
      };
      window.__libreShockwaveDebugLog.push(entry);
      const line = `[${entry.time}] ${entry.level.toUpperCase()} ${entry.message}`;
      debugLog.value = debugLog.value ? `${debugLog.value}\n${line}` : line;
      debugLog.scrollTop = debugLog.scrollHeight;
    }

    function paramsToText(params) {
      return Object.entries(params).map(([key, value]) => `${key}=${value}`).join("\n");
    }

    function promptForSsoTicket() {
      const ticket = window.prompt("Enter SSO ticket");
      if (ticket === null) return null;
      const trimmed = ticket.trim();
      return trimmed ? trimmed : null;
    }

    function replaceBetaClientSsoPlaceholder(paramsText, ticket) {
      return paramsText.replaceAll(betaClientSsoPlaceholder, ticket);
    }

    function setBetaClientPreset() {
      movieUrl.value = betaClientMovieUrl;
      const paramsText = paramsToText(betaClientParams);
      const ticket = promptForSsoTicket();
      paramsBox.value = ticket
        ? replaceBetaClientSsoPlaceholder(paramsText, ticket)
        : paramsText;
    }

    function ensureBetaClientSsoTicket() {
      if (!paramsBox.value.includes(betaClientSsoPlaceholder)) {
        return true;
      }
      const ticket = promptForSsoTicket();
      if (!ticket) {
        status.textContent = "SSO ticket required";
        loadButton.disabled = false;
        setPlaybackButtonsEnabled(false);
        return false;
      }
      paramsBox.value = replaceBetaClientSsoPlaceholder(paramsBox.value, ticket);
      return true;
    }

    function textToParams(text) {
      const params = {};
      for (const line of text.split(/\r?\n/)) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        const index = trimmed.indexOf("=");
        if (index <= 0) continue;
        params[trimmed.slice(0, index).trim()] = trimmed.slice(index + 1).trim();
      }
      return params;
    }

    const searchParams = new URLSearchParams(location.search);
    let debugPlaybackEnabled = searchParams.get("debugPlayback") === "1";
    const slowHandlerWarningMs = Number.isFinite(Number(searchParams.get("slowHandlerWarningMs")))
      ? Math.max(0, Number(searchParams.get("slowHandlerWarningMs")))
      : 1000;
    movieUrl.value = searchParams.get("movie") || habboUrl;
    paramsBox.value = paramsToText(LibreShockwavePlayer.defaultHabboParams);
    debugPlayback.checked = debugPlaybackEnabled;
    setPlaybackButtonsEnabled(false);
    window.__libreShockwaveSocketEvents = [];
    window.__lastLibreShockwaveInfo = null;
    window.__libreShockwaveDebugLog = [];
    window.debugPlaybackEnabled = debugPlaybackEnabled;
    window.addEventListener("error", (event) => {
      appendDebugLog("error", event.error || event.message);
    });
    window.addEventListener("unhandledrejection", (event) => {
      appendDebugLog("error", event.reason || "Unhandled promise rejection");
    });

    const player = LibreShockwavePlayer.create("stage", {
      url: movieUrl.value,
      params: textToParams(paramsBox.value),
      autoload: searchParams.get("autoload") === "1",
      autoplay: true,
      debugPlaybackEnabled,
      slowHandlerWarningMs,
      onReady() {
        status.textContent = "Ready";
        appendDebugLog("debug", "Player ready");
      },
      onLoad(info) {
        window.__lastLibreShockwaveInfo = info;
        status.textContent = "Loaded";
        appendDebugLog("debug", `Loaded ${movieUrl.value}`);
        loadButton.disabled = false;
        setPlaybackButtonsEnabled(true);
        tempo.value = String(info.tempoOverride || info.baseTempo || info.tempo || 0);
        frameInfo.textContent = `Frame ${info.currentFrame || 0} / ${info.frameCount || 0} · ${info.tempo || 0} fps`;
        sizeInfo.textContent = `${info.width || 0}×${info.height || 0}`;
      },
      onFrame(info) {
        window.__lastLibreShockwaveInfo = info;
        frameInfo.textContent = `Frame ${info.currentFrame || 0} / ${info.frameCount || 0} · ${info.tempo || 0} fps`;
        sizeInfo.textContent = `${info.width || 0}×${info.height || 0}`;
        if (info.error) status.textContent = info.error;
      },
      onSocket(event) {
        window.__libreShockwaveSocketEvents.push(event);
        const preview = event.preview && event.preview.hex
          ? ` ${event.byteLength || 0}b ${event.preview.hex} ${event.preview.ascii || ""}`
          : "";
        appendDebugLog("socket", `${event.phase || "event"} ${event.url || event.host || ""}${preview}`);
      },
      onTempo(event) {
        tempo.value = String(event.tempo || 0);
      },
      onError(message) {
        status.textContent = message;
        status.classList.add("error");
        loadButton.disabled = false;
        setPlaybackButtonsEnabled(false);
      },
      onWarning(message) {
        status.textContent = message;
      },
      onDebug(event) {
        appendDebugLog(event.level, event.message);
      }
    });

    loadButton.addEventListener("click", () => {
      status.classList.remove("error");
      status.textContent = "Loading";
      loadButton.disabled = true;
      setPlaybackButtonsEnabled(false);
      if (!ensureBetaClientSsoTicket()) {
        return;
      }
      player.load(movieUrl.value, { params: textToParams(paramsBox.value), autoplay: false, debugPlaybackEnabled, slowHandlerWarningMs })
        .then(() => player.play())
        .catch(() => {
          loadButton.disabled = false;
          setPlaybackButtonsEnabled(false);
        });
    });
    playButton.addEventListener("click", () => player.play());
    pauseButton.addEventListener("click", () => player.pause());
    stopButton.addEventListener("click", () => player.stop());
    tempo.addEventListener("change", () => player.setTempoOverride(Number(tempo.value || 0)));
    debugPlayback.addEventListener("change", () => {
      debugPlaybackEnabled = debugPlayback.checked;
      window.debugPlaybackEnabled = debugPlaybackEnabled;
      player.setDebugPlaybackEnabled(debugPlaybackEnabled);
      appendDebugLog("debug", `debugPlaybackEnabled=${debugPlaybackEnabled}`);
    });
    clearDebugLog.addEventListener("click", () => {
      debugLog.value = "";
    });
    paramsBox.addEventListener("change", () => player.setParams(textToParams(paramsBox.value)));
    document.getElementById("preset-habbo").addEventListener("click", () => {
      movieUrl.value = habboUrl;
      paramsBox.value = paramsToText(LibreShockwavePlayer.defaultHabboParams);
    });
    document.getElementById("preset-loader").addEventListener("click", () => {
      movieUrl.value = loaderUrl;
      paramsBox.value = "";
    });
    document.getElementById("preset-beta-client").addEventListener("click", () => {
      setBetaClientPreset();
    });
  </script>
</body>
</html>
